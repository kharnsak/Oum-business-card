<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สุภาพรรณ อาศัยราช</title>
  <meta name="format-detection" content="telephone=no">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@800&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    a { color: inherit; text-decoration: none; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #BEBEBE;
    }

    /*
      scale ตาม viewport ทั้ง width และ height:
      - mobile (แนวตั้ง): จำกัดด้วย width → calc(100vw - 32px)
      - desktop (จอใหญ่): จำกัดด้วย height → calc((100vh - 40px) * 85 / 55)
    */
    .card {
      container-type: inline-size;
      width: min(calc((100vh - 40px) * 85 / 55), calc(100vw - 32px));
      aspect-ratio: 85 / 55;
      background: #FAF8F2;
      padding: 3.5cqw 5.5cqw 3.5cqw 5.5cqw;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.28);
    }

    .logo {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 800;
      font-size: 9cqw;
      color: #EB0A1E;
      letter-spacing: 0.06em;
      line-height: 1;
    }

    .name-block { margin-top: 7.5cqw; }

    .full-name {
      font-family: 'Sarabun', sans-serif;
      font-size: 6.8cqw;
      font-weight: 400;
      color: #181818;
      line-height: 1.15;
      margin-bottom: 0.5cqw;
    }

    .position {
      font-family: 'Sarabun', sans-serif;
      font-size: 2.8cqw;
      font-weight: 400;
      color: #181818;
      line-height: 1.45;
    }

    .company-section { margin-top: 6.5cqw; }

    .company-name {
      font-family: 'Sarabun', sans-serif;
      font-size: 3.0cqw;
      font-weight: 700;
      color: #181818;
      line-height: 1.4;
      margin-bottom: 0.35cqw;
    }

    .address {
      font-family: 'Sarabun', sans-serif;
      font-size: 2.6cqw;
      font-weight: 400;
      color: #181818;
      line-height: 1.48;
      margin-bottom: 0.3cqw;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 2cqw;
    }

    .contact-item {
      font-family: 'Sarabun', sans-serif;
      font-size: 2.6cqw;
      font-weight: 400;
      color: #181818;
      line-height: 1.48;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TOYOTA</div>

    <div class="name-block">
      <div class="full-name">สุภาพรรณ อาศัยราช</div>
      <div class="position">ผู้ช่วยผู้จัดการ</div>
    </div>

    <div class="company-section">
      <div class="company-name">บริษัท โตโยต้า ออโต้ บอดี้ ประเทศไทย จำกัด</div>
      <div class="address">
        186/1 หมู่1 ถนนทางรถไฟเก่า ต.สำโรงใต้ อ.พระประแดง จ.สมุทรปราการ 10130<br>
        (สำนักงานใหญ่)
      </div>
      <div class="contact-grid">
        <div class="contact-item">TAX ID&nbsp;&nbsp;: 0105521003044</div>
        <div class="contact-item">สาขาที่ : สำนักงานใหญ่</div>
        <div class="contact-item">มือถือ&nbsp;&nbsp;&nbsp;: 090-973-7361</div>
        <div class="contact-item">E-mail&nbsp;&nbsp;: sarsaira@toyota.co.th</div>
      </div>
    </div>
  </div>
</body>
</html>
